name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint with Ruff
        run: |
          ruff check python/
      - name: Run mypy
        run: |
          mypy python/ --ignore-missing-imports
      - name: Run tests with coverage
        run: |
          pytest python/tests --cov=python --cov-report=term-missing

  cpp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure
        run: cmake -S cpp -B cpp/build
      - name: Build
        run: cmake --build cpp/build
      - name: Run smoke test
        run: |
          mkdir -p data
          ./cpp/build/esfc --system kuramoto --network er --n 50 --p 0.1 \
                           --k 1.0 --tmax 5.0 --dt 0.1 --seed 1 --out data/test.csv
          test -f data/test.csv
          lines=$(wc -l < data/test.csv)
          test "$lines" -eq 52
